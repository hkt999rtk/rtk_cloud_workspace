name: Linode CI Orchestrator

on:
  pull_request:
    paths:
      - '.github/workflows/linode-ci-orchestrator.yml'
      - 'scripts/linode-ci-runners/**'
      - 'docs/linode-ci-runners.md'
  workflow_dispatch:
    inputs:
      account_run_id:
        description: 'rtk_account_manager GitHub Actions run id to rerun/watch/archive'
        required: false
        type: string
      admin_run_id:
        description: 'rtk_cloud_admin GitHub Actions run id to rerun/watch/archive'
        required: false
        type: string
      frontend_run_id:
        description: 'rtk_cloud_frontend GitHub Actions run id to rerun/watch/archive'
        required: false
        type: string
      client_run_id:
        description: 'rtk_cloud_client Linux GitHub Actions run id to rerun/watch/archive'
        required: false
        type: string
      logger_run_id:
        description: 'rtk_cloud_logger GitHub Actions run id to rerun/watch/archive'
        required: false
        type: string
      rerun:
        description: 'Rerun each provided run id before watching'
        required: true
        default: true
        type: boolean
      shutdown_policy:
        description: 'When to shut down the Linode CI runner VM'
        required: true
        default: always
        type: choice
        options:
          - always
          - on-success
          - never

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.RTK_CI_GITHUB_TOKEN }}
  LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
  LINODE_OBJ_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJ_ACCESS_KEY_ID }}
  LINODE_OBJ_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJ_SECRET_ACCESS_KEY }}
  LINODE_OBJ_BUCKET: ${{ secrets.LINODE_OBJ_BUCKET }}
  LINODE_OBJ_ENDPOINT: ${{ secrets.LINODE_OBJ_ENDPOINT }}
  CI_RUNNER_PROFILE: shared-linux
  LINODE_CI_SMOKE_ONLY: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

jobs:
  orchestrate:
    name: Boot runners, run CI, archive artifacts, shutdown
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check required secrets
        run: |
          missing=0
          required="GH_TOKEN LINODE_TOKEN"
          if [ "$LINODE_CI_SMOKE_ONLY" != "true" ]; then
            required="$required LINODE_OBJ_ACCESS_KEY_ID LINODE_OBJ_SECRET_ACCESS_KEY LINODE_OBJ_BUCKET LINODE_OBJ_ENDPOINT"
          fi
          for name in $required; do
            if [ -z "${!name:-}" ]; then
              echo "missing required secret-backed env: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out workspace
        uses: actions/checkout@v6

      - name: Set up Python upload fallback
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install S3 upload dependency
        run: python -m pip install --disable-pip-version-check boto3

      - name: Run Linode CI session
        run: |
          if [ "$LINODE_CI_SMOKE_ONLY" = "true" ]; then
            scripts/linode-ci-runners/run-ci-session.sh \
              --smoke-only true \
              --rerun false \
              --shutdown-policy always
          else
            scripts/linode-ci-runners/run-ci-session.sh \
              --account-run-id "${{ inputs.account_run_id }}" \
              --admin-run-id "${{ inputs.admin_run_id }}" \
              --frontend-run-id "${{ inputs.frontend_run_id }}" \
              --client-run-id "${{ inputs.client_run_id }}" \
              --logger-run-id "${{ inputs.logger_run_id }}" \
              --rerun "${{ inputs.rerun }}" \
              --shutdown-policy "${{ inputs.shutdown_policy }}"
          fi
