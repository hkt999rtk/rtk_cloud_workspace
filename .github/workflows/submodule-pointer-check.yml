name: Submodule Pointer Check

on:
  pull_request:
    paths:
      - '.gitmodules'
      - '.github/workflows/submodule-pointer-check.yml'
      - 'repos/**'
  push:
    branches:
      - main
    paths:
      - '.gitmodules'
      - '.github/workflows/submodule-pointer-check.yml'
      - 'repos/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submodules:
    name: Check submodule pointers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out workspace metadata
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Validate submodule pointers
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f .gitmodules ]; then
            echo "missing .gitmodules" >&2
            exit 1
          fi

          paths_file="$(mktemp)"
          git config --file .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}' | sort > "$paths_file"
          if [ ! -s "$paths_file" ]; then
            echo "no submodules declared in .gitmodules" >&2
            exit 1
          fi

          {
            echo "| Path | Commit | URL |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r path; do
            name="$(git config --file .gitmodules --get-regexp 'submodule\..*\.path' | awk -v wanted="$path" '$2 == wanted { key=$1; sub(/^submodule\./, "", key); sub(/\.path$/, "", key); print key; exit }')"
            url="$(git config --file .gitmodules --get "submodule.$name.url")"

            if [ -z "$url" ]; then
              echo "missing url for submodule path: $path" >&2
              exit 1
            fi

            mode="$(git ls-tree HEAD -- "$path" | awk '{print $1}')"
            sha="$(git ls-tree HEAD -- "$path" | awk '{print $3}')"
            if [ "$mode" != "160000" ]; then
              echo "path is not recorded as a gitlink: $path (mode=$mode)" >&2
              exit 1
            fi
            if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "invalid submodule commit pointer for $path: $sha" >&2
              exit 1
            fi

            printf '%s\t%s\t%s\n' "$path" "$sha" "$url"
            printf '| `%s` | `%s` | `%s` |\n' "$path" "$sha" "$url" >> "$GITHUB_STEP_SUMMARY"
          done < "$paths_file"
